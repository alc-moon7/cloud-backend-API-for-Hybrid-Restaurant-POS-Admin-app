services:
  postgres:
    image: postgres:16-alpine
    container_name: hybrid-pos-postgres
    environment:
      POSTGRES_DB: hybrid_pos
      POSTGRES_USER: hybrid_pos
      POSTGRES_PASSWORD: hybrid_pos_password
    ports:
      - "5432:5432"
    volumes:
      - hybrid_pos_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hybrid_pos -d hybrid_pos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hybrid_pos_postgres:
